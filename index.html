<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Nihat Typetest</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

#timer{
font-size:20px;
margin-bottom:20px;
}

#text{
background:white;
padding:20px;
border-radius:8px;
font-size:22px;
max-width:800px;
margin:auto;
line-height:1.8;
}

.correct{
color:green;
}

.wrong{
color:red;
}

#input{
margin-top:20px;
width:800px;
height:120px;
font-size:18px;
padding:10px;
}

#results{
margin-top:20px;
font-size:20px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Nihat Typetest</h1>

<div id="timer">Tijd: 60</div>

<div id="text"></div>

<textarea id="input" placeholder="Begin met typen..."></textarea>

<div id="results">
WPM: <span id="wpm">0</span>
</div>

<button onclick="location.reload()">Nieuwe test</button>

<script>

const words = ("dit is een simpele typetest gemaakt door nihat oefen dagelijks om sneller te typen en beter te worden met je toetsenbord snelheid en nauwkeurigheid zijn beide belangrijk tijdens het typen").split(" ");

const textDiv = document.getElementById("text");

words.forEach(word=>{
const span = document.createElement("span");
span.innerText = word + " ";
textDiv.appendChild(span);
});

let time = 60;
let started = false;

const input = document.getElementById("input");

input.addEventListener("input", ()=>{

if(!started){
started = true;
startTimer();
}

const typed = input.value.split(" ");
const spans = textDiv.querySelectorAll("span");

spans.forEach((span,i)=>{
span.classList.remove("correct","wrong");

if(typed[i] == null){
return;
}

if(typed[i] === words[i]){
span.classList.add("correct");
}else{
span.classList.add("wrong");
}
});

});

function startTimer(){

const timer = setInterval(()=>{

time--;

document.getElementById("timer").innerText = "Tijd: " + time;

if(time <= 0){

clearInterval(timer);

calculateWPM();

input.disabled = true;

}

},1000);

}

function calculateWPM(){

const typedWords = input.value.trim().split(" ").length;

const wpm = Math.round(typedWords);

document.getElementById("wpm").innerText = wpm;

}

</script>

</body>
</html>
