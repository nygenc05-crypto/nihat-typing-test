<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihat Typetest</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 800px;
    text-align: center;
  }

  .text-display {
    font-size: 1.4rem;
    line-height: 1.8rem;
    margin-bottom: 20px;
  }

  .text-input {
    width: 100%;
    padding: 12px;
    font-size: 1.2rem;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .highlight {
    color: #4caf50;
  }

  .error {
    color: #ff4c4c;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Typetest van Nihat</h1>
  <div class="text-display" id="textDisplay"></div>
  <input type="text" id="textInput" class="text-input" placeholder="Begin met typen..." autofocus>
</div>

<script>
const texts = [
  "Dit is een voorbeeldzin voor je typetest.",
  "Typ snel en nauwkeurig om je score te verbeteren.",
  "Hier komt nog een zin die je kan typen.",
  "Blijf oefenen, en probeer langere zinnen tegelijk te typen."
];

let currentIndex = 0;
let currentText = "";
const display = document.getElementById('textDisplay');
const input = document.getElementById('textInput');

function loadText() {
  currentText = texts[currentIndex];
  display.innerHTML = currentText;
  input.value = "";
}

input.addEventListener('input', () => {
  const value = input.value;
  let html = '';
  for(let i = 0; i < currentText.length; i++){
    if(i < value.length){
      if(value[i] === currentText[i]){
        html += `<span class="highlight">${currentText[i]}</span>`;
      } else {
        html += `<span class="error">${currentText[i]}</span>`;
      }
    } else {
      html += currentText[i];
    }
  }
  display.innerHTML = html;

  if(value === currentText){
    currentIndex++;
    if(currentIndex >= texts.length) currentIndex = 0;
    loadText();
  }
});

loadText();
</script>
</body>
</html>
