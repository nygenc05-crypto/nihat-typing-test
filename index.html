<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihat Typetest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');

  body {
    margin: 0;
    font-family: 'Roboto Mono', monospace;
    background: radial-gradient(circle at center, #0f0c29, #302b63, #24243e);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 900px;
    text-align: center;
  }

  h1 {
    margin-bottom: 15px;
    color: #f0a500;
  }

  .text-display {
    font-size: 1.4rem;
    line-height: 2rem;
    margin-bottom: 20px;
    min-height: 120px;
  }

  .text-input {
    width: 100%;
    padding: 12px;
    font-size: 1.2rem;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .highlight {
    color: #4caf50;
  }

  .error {
    color: #ff4c4c;
  }

  .timer {
    margin-top: 15px;
    font-size: 1.3rem;
  }

  .scoreboard {
    margin-top: 20px;
    font-size: 1.5rem;
    color: #f0a500;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Typetest van Nihat</h1>
  <div class="text-display" id="textDisplay"></div>
  <input type="text" id="textInput" class="text-input" placeholder="Begin met typen..." autofocus>
  <div class="timer" id="timer">01:00</div>
  <div class="scoreboard" id="scoreboard" style="display:none;"></div>
</div>

<script>
const texts = [
  "Dit is een voorbeeldzin voor je typetest. Typ snel en nauwkeurig.",
  "Hier komt nog een langere zin die je kan typen om snelheid te oefenen.",
  "Blijf oefenen en probeer meerdere zinnen tegelijk te typen.",
  "De snelheid van je vingers bepaalt je score aan het einde van de test.",
  "Elke fout die je maakt telt mee, blijf gefocust en snel typen."
];

let currentIndex = 0;
let currentText = "";
let totalTypedWords = 0;
let timer = 60;
let timerInterval = null;

const display = document.getElementById('textDisplay');
const input = document.getElementById('textInput');
const timerDisplay = document.getElementById('timer');
const scoreboard = document.getElementById('scoreboard');

function loadText() {
  currentText = texts[currentIndex];
  display.innerHTML = currentText;
  input.value = "";
}

function startTimer() {
  timerInterval = setInterval(() => {
    timer--;
    const minutes = String(Math.floor(timer / 60)).padStart(2,'0');
    const seconds = String(timer % 60).padStart(2,'0');
    timerDisplay.textContent = `${minutes}:${seconds}`;
    if(timer <= 0){
      clearInterval(timerInterval);
      endTest();
    }
  }, 1000);
}

function endTest() {
  input.disabled = true;
  const wpm = totalTypedWords;
  scoreboard.style.display = 'block';
  scoreboard.textContent = `Je hebt ${wpm} woorden per minuut getypt!`;
}

input.addEventListener('input', () => {
  if(!timerInterval) startTimer();

  const value = input.value;
  let html = '';
  for(let i = 0; i < currentText.length; i++){
    if(i < value.length){
      if(value[i] === currentText[i]){
        html += `<span class="highlight">${currentText[i]}</span>`;
      } else {
        html += `<span class="error">${currentText[i]}</span>`;
      }
    } else {
      html += currentText[i];
    }
  }
  display.innerHTML = html;

  if(value === currentText){
    totalTypedWords += currentText.split(' ').length;
    currentIndex++;
    if(currentIndex >= texts.length) currentIndex = 0; // start opnieuw
    loadText();
  }
});

// initial load
loadText();
</script>
</body>
</html>
