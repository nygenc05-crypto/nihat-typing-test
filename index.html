<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Nihat Typetest</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;

background-image:url("https://images.unsplash.com/photo-1544551763-46a013bb70d5");
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.65);
padding:40px;
border-radius:20px;
width:800px;
backdrop-filter:blur(6px);
}

h1{
font-size:42px;
margin-bottom:10px;
}

#timer{
font-size:26px;
margin-bottom:20px;
color:#00eaff;
}

#text{
font-size:24px;
line-height:40px;
margin-bottom:25px;
}

#text span{
opacity:0.6;
}

#text .active{
opacity:1;
color:white;
font-weight:bold;
}

input{
width:100%;
padding:15px;
font-size:20px;
border-radius:10px;
border:none;
outline:none;
}

.scorebox{
animation:pop 0.8s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="overlay">

<h1>⚡ Nihat Typetest</h1>

<div id="timer">60</div>

<div id="text"></div>

<input id="input" placeholder="Begin met typen...">

<div id="result"></div>

</div>

<canvas id="fireworks"></canvas>

<script>

const textElement=document.getElementById("text")
const input=document.getElementById("input")
const timerElement=document.getElementById("timer")
const result=document.getElementById("result")

let sentences=[

"de snelle vos springt over de luie hond",
"nihat bouwt zijn eigen typetest website",
"programmeren wordt makkelijker door veel te oefenen",
"een goede typist kijkt bijna nooit naar het toetsenbord",
"snel typen is een handige vaardigheid",
"hoe vaker je oefent hoe sneller je wordt",
"focus op snelheid maar vergeet de nauwkeurigheid niet",
"deze typetest lijkt een beetje op tienfastfingers",
"probeer zoveel mogelijk woorden correct te typen",
"blijf rustig en typ in een goed tempo",
"door oefenen kun je elke dag beter worden",
"dit is een lange zin om je snelheid goed te testen",
"nihat maakt een luxe typetest met javascript",
"blijf doorgaan totdat de timer op nul staat"

]

let words=sentences.join(" ").split(" ")

let index=0
let time=60
let timer=null

let correctWords=0

function render(){

textElement.innerHTML=""

let visibleWords=words.slice(index,index+25)

visibleWords.forEach((word,i)=>{

let span=document.createElement("span")

span.textContent=word+" "

if(i==0)span.classList.add("active")

textElement.appendChild(span)

})

}

function startTimer(){

timer=setInterval(()=>{

time--

timerElement.textContent=time

if(time<=0){

finishTest()

}

},1000)

}

input.addEventListener("keydown",(e)=>{

if(e.key===" "){

e.preventDefault()

let typed=input.value.trim()

let current=words[index]

if(typed===current){

correctWords++

}

index++

if(index>=words.length){

index=0
}

input.value=""

render()

}

})

function finishTest(){

clearInterval(timer)

input.disabled=true

let wpm=correctWords

result.innerHTML=`

<div class="scorebox">

<h1>🎉 Klaar!</h1>

<h2>${wpm} Woorden per minuut</h2>

<p>Goed gedaan Nihat!</p>

</div>

`

startFireworks()

}

function startFireworks(){

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function create(){

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100

})

}

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.beginPath()
ctx.arc(p.x,p.y,3,0,Math.PI*2)
ctx.fillStyle="orange"
ctx.fill()

})

particles=particles.filter(p=>p.life>0)

requestAnimationFrame(update)

}

create()
update()

}

render()
startTimer()

</script>

</body>
</html>
