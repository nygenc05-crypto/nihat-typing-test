<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihat Luxe Typetest</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #1f1c2c);
    overflow: hidden;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* Animatie achtergrondstrepen */
  .background-animation {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0.05) 2px,
      transparent 2px,
      transparent 10px
    );
    animation: moveBackground 5s linear infinite;
    z-index: -1;
  }

  @keyframes moveBackground {
    0% {background-position: 0 0;}
    100% {background-position: 100px 100px;}
  }

  .container {
    background: rgba(0,0,0,0.8);
    padding: 40px 50px;
    border-radius: 20px;
    width: 95%;
    max-width: 1000px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    text-align: center;
    transition: all 0.3s ease-in-out;
  }

  h1 {
    font-family: 'Roboto Mono', monospace;
    font-weight: 700;
    font-size: 2.5rem;
    margin-bottom: 20px;
    background: linear-gradient(45deg, #f0a500, #ffdd00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .text-display {
    font-family: 'Roboto Mono', monospace;
    font-size: 1.5rem;
    line-height: 2.2rem;
    margin-bottom: 20px;
    min-height: 180px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
    transition: all 0.2s ease;
  }

  .text-input {
    width: 100%;
    padding: 15px;
    font-size: 1.3rem;
    border-radius: 12px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    transition: all 0.2s ease;
  }

  .text-input:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 15px #f0a500;
  }

  .highlight {
    color: #4caf50;
    font-weight: 600;
    transition: 0.1s;
  }

  .error {
    color: #ff4c4c;
    font-weight: 600;
    transition: 0.1s;
  }

  .timer {
    font-size: 1.5rem;
    margin-top: 10px;
    font-weight: 700;
    color: #f0a500;
  }

  .scoreboard {
    margin-top: 25px;
    font-size: 2rem;
    font-weight: 700;
    color: #ffdd00;
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    0% {opacity:0; transform: translateY(-20px);}
    100% {opacity:1; transform: translateY(0);}
  }
</style>
</head>
<body>
<div class="background-animation"></div>
<div class="container">
  <h1>Typetest van Nihat</h1>
  <div class="text-display" id="textDisplay"></div>
  <input type="text" id="textInput" class="text-input" placeholder="Begin met typen..." autofocus>
  <div class="timer" id="timer">01:00</div>
  <div class="scoreboard" id="scoreboard" style="display:none;"></div>
</div>

<script>
const texts = [
  "Typ snel en nauwkeurig om je snelheid te testen",
  "Blijf gefocust en laat geen fouten voorbij gaan",
  "De vingers bewegen sneller naarmate je oefent",
  "Elke zin die je typt draagt bij aan je score",
  "Probeer langere passages zonder stoppen te typen",
  "Concentratie is key om een hoge woorden per minuut te halen",
  "Voel de snelheid en geniet van het typen",
  "Je kunt beginnen met eenvoudige woorden en doorgroeien",
  "Herhaal de zinnen voor maximale oefening en snelheid",
  "Focus, snelheid, precisie en doorzettingsvermogen zijn belangrijk",
  "Typ alles correct en houd het tempo hoog",
  "Laat je niet afleiden en blijf geconcentreerd",
  "Langere zinnen helpen je vingers sneller te bewegen",
  "Controleer je fouten en verbeter je nauwkeurigheid",
  "Een goede typist blijft rustig onder druk",
  "Probeer consistentie te houden tijdens de test",
  "Blijf oefenen en je zult merken dat je sneller wordt",
  "Het gaat niet alleen om snelheid, maar ook om precisie",
  "Je score aan het einde toont hoeveel woorden je per minuut typt",
  "Geniet van het proces en blijf leren tijdens het typen"
];

let currentIndex = 0;
let currentText = "";
let totalTypedWords = 0;
let timer = 60;
let timerInterval = null;

const display = document.getElementById('textDisplay');
const input = document.getElementById('textInput');
const timerDisplay = document.getElementById('timer');
const scoreboard = document.getElementById('scoreboard');

function loadText() {
  currentText = texts[currentIndex];
  display.innerHTML = currentText;
  input.value = "";
}

function startTimer() {
  timerInterval = setInterval(() => {
    timer--;
    const minutes = String(Math.floor(timer / 60)).padStart(2,'0');
    const seconds = String(timer % 60).padStart(2,'0');
    timerDisplay.textContent = `${minutes}:${seconds}`;
    if(timer <= 0){
      clearInterval(timerInterval);
      endTest();
    }
  }, 1000);
}

function endTest() {
  input.disabled = true;
  const wpm = totalTypedWords;
  scoreboard.style.display = 'block';
  scoreboard.textContent = `Je hebt ${wpm} woorden per minuut getypt!`;
}

input.addEventListener('input', () => {
  if(!timerInterval) startTimer();

  const value = input.value;
  let html = '';
  for(let i = 0; i < currentText.length; i++){
    if(i < value.length){
      if(value[i] === currentText[i]){
        html += `<span class="highlight">${currentText[i]}</span>`;
      } else {
        html += `<span class="error">${currentText[i]}</span>`;
      }
    } else {
      html += currentText[i];
    }
  }
  display.innerHTML = html;

  // Woorden tellen ongeacht fouten
  totalTypedWords = value.trim().split(/\s+/).length;

  // Automatisch naar volgende zin als je enter of spatie na zin drukt
  if(value.endsWith(' ')) {
    currentIndex++;
    if(currentIndex >= texts.length) currentIndex = 0;
    loadText();
  }
});

// initial load
loadText();
</script>
</body>
</html>
