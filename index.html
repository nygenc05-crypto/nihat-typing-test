<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihat Typetest</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:url("https://images.unsplash.com/photo-1601758174114-e711c0cbaa69?auto=format&fit=crop&w=2000&q=80") no-repeat center center fixed;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:20px;
width:900px;
max-width:90%;
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;
}

h1{
font-family:'Roboto Mono',monospace;
font-size:2.5rem;
margin-bottom:25px;
background:linear-gradient(45deg,#f0a500,#ffdd00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.text-display{
font-family:'Roboto Mono',monospace;
font-size:1.6rem;
line-height:2.3rem;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:12px;
margin-bottom:20px;
min-height:120px;
}

.text-input{
width:100%;
padding:15px;
font-size:1.3rem;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

.text-input:focus{
background:rgba(255,255,255,0.2);
box-shadow:0 0 10px #f0a500;
}

.highlight{
color:#4caf50;
font-weight:600;
}

.error{
color:#ff4c4c;
font-weight:600;
}

.timer{
margin-top:15px;
font-size:1.4rem;
font-weight:bold;
color:#f0a500;
}

.scoreboard{
margin-top:25px;
font-size:2rem;
font-weight:bold;
color:#ffdd00;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Nihat Typetest</h1>

<div id="textDisplay" class="text-display"></div>

<input
id="textInput"
class="text-input"
placeholder="Begin met typen..."
autocomplete="off"
>

<div id="timer" class="timer">01:00</div>

<div id="scoreboard" class="scoreboard"></div>

</div>

<script>

const texts = [

"Typ snel en nauwkeurig om je snelheid te testen",
"Blijf gefocust en laat geen fouten voorbij gaan",
"De vingers bewegen sneller naarmate je oefent",
"Elke zin die je typt draagt bij aan je score",
"Probeer langere passages zonder stoppen te typen",
"Concentratie is belangrijk om een hoge woorden per minuut score te halen",
"Voel de snelheid en geniet van het typen",
"Je kunt beginnen met eenvoudige woorden en steeds sneller worden",
"Herhaal zinnen en verbeter je typvaardigheid",
"Focus snelheid precisie en doorzettingsvermogen zijn belangrijk",
"Typ alles correct en houd het tempo hoog",
"Laat je niet afleiden en blijf geconcentreerd",
"Langere zinnen helpen je vingers sneller te bewegen",
"Controleer je fouten en verbeter je nauwkeurigheid",
"Een goede typist blijft rustig onder druk",
"Probeer consistent te blijven tijdens de test",
"Blijf oefenen en je zult merken dat je steeds sneller wordt",
"Het gaat niet alleen om snelheid maar ook om precisie",
"Je score laat zien hoeveel woorden je per minuut typt",
"Geniet van het proces en blijf leren tijdens het typen"

];

let currentIndex = 0;
let currentText = "";
let timer = 60;
let timerInterval = null;
let totalWords = 0;

const display = document.getElementById("textDisplay");
const input = document.getElementById("textInput");
const timerDisplay = document.getElementById("timer");
const scoreboard = document.getElementById("scoreboard");

function loadText(){

currentText = texts[currentIndex];

display.innerHTML = currentText;

input.value = "";

}

function startTimer(){

if(timerInterval) return;

timerInterval = setInterval(()=>{

timer--;

const minutes = String(Math.floor(timer/60)).padStart(2,"0");
const seconds = String(timer%60).padStart(2,"0");

timerDisplay.textContent = `${minutes}:${seconds}`;

if(timer <= 0){

clearInterval(timerInterval);

finishTest();

}

},1000);

}

function finishTest(){

input.disabled = true;

scoreboard.style.display = "block";

scoreboard.textContent =
`Je hebt ${totalWords} woorden per minuut getypt`;

}

input.addEventListener("input",()=>{

startTimer();

const value = input.value;

let html = "";

for(let i=0;i<currentText.length;i++){

if(i < value.length){

if(value[i] === currentText[i]){

html += `<span class="highlight">${currentText[i]}</span>`;

}else{

html += `<span class="error">${currentText[i]}</span>`;

}

}else{

html += currentText[i];

}

}

display.innerHTML = html;

totalWords = value.trim().split(/\s+/).length;

if(value === currentText){

currentIndex++;

if(currentIndex >= texts.length){

currentIndex = 0;

}

loadText();

}

});

loadText();

</script>

</body>
</html>
