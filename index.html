<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Nihat Typetest</title>

<style>
body{
font-family: Arial, sans-serif;
background:#1f2933;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#323f4b;
padding:30px;
border-radius:12px;
}

#text{
font-size:20px;
margin-bottom:20px;
line-height:1.6;
}

textarea{
width:100%;
height:120px;
font-size:18px;
padding:10px;
border-radius:8px;
border:none;
}

.stats{
margin-top:20px;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Nihat Typetest</h1>

<p id="text"></p>

<textarea id="input" placeholder="Begin met typen..."></textarea>

<div class="stats">
<p>⏱ Tijd: <span id="time">60</span>s</p>
<p>⚡ WPM: <span id="wpm">0</span></p>
<p>❌ Fouten: <span id="errors">0</span></p>
</div>

<button onclick="location.reload()">Nieuwe test</button>

</div>

<script>

const texts = [
"Typen is een vaardigheid die je steeds beter kunt leren door te oefenen en regelmatig te trainen.",
"Veel mensen proberen hun typesnelheid te verbeteren door dagelijks korte typetesten te doen.",
"Een snelle typesnelheid kan handig zijn bij school werk programmeren of kantoorwerk.",
"Concentratie en nauwkeurigheid zijn belangrijker dan alleen maar snel proberen te typen."
];

let randomText = texts[Math.floor(Math.random()*texts.length)];
document.getElementById("text").innerText = randomText;

let time = 60;
let timerStarted = false;
let timer;

document.getElementById("input").addEventListener("input", function(){

if(!timerStarted){
timerStarted = true;
timer = setInterval(updateTime,1000);
}

let typed = this.value;

let errors = 0;
for(let i=0;i<typed.length;i++){
if(typed[i] !== randomText[i]){
errors++;
}
}

document.getElementById("errors").innerText = errors;

let wordsTyped = typed.trim().split(" ").length;
let wpm = Math.round(wordsTyped * (60 - time + 1) / 1);

document.getElementById("wpm").innerText = wpm;

});

function updateTime(){
time--;
document.getElementById("time").innerText = time;

if(time === 0){
clearInterval(timer);
document.getElementById("input").disabled = true;
alert("Tijd is voorbij!");
}
}

</script>

</body>
</html>
